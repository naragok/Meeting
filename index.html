<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>M-Minutes PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 모바일 PWA 및 iOS 사파리 전체화면 최적화 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스마트 회의록">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%234F46E5'><rect width='100' height='100' rx='20'/><path d='M30 35h40M30 50h40M30 65h25' stroke='white' stroke-width='8' stroke-linecap='round'/><circle cx='70' cy='65' r='6' fill='%2310B981'/></svg>">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* 폰트 크기 반응형 바인딩 */
        .font-size-small textarea, .font-size-small input { font-size: 0.75rem !important; }
        .font-size-base textarea, .font-size-base input { font-size: 0.875rem !important; }
        .font-size-large textarea, .font-size-large input { font-size: 1.125rem !important; }

        /* 부드러운 하단 터치바 스크롤 최적화 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        /* 인쇄 및 PDF 저장용 스타일 시트 보정 */
        @media print {
            .no-print { display: none !important; }
            main { display: block !important; margin: 0 !important; padding: 1cm !important; }
            textarea { border: none !important; height: auto !important; overflow: visible !important; background: transparent !important; }
            .print-card { border: none !important; box-shadow: none !important; background: transparent !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-800 dark:text-slate-200 font-size-base">

    <header class="no-print sticky top-0 z-40 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="p-2 bg-indigo-600 text-white rounded-xl shadow-lg">
                <i data-lucide="zap" class="w-5 h-5"></i>
            </div>
            <div class="hidden sm:block">
                <h1 class="text-md font-bold tracking-tight flex items-center gap-2">
                    M-Minutes <span class="text-[10px] bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-full">v2.5 PRESET</span>
                </h1>
                <!-- 회의 경과 타이머 -->
                <div class="flex items-center gap-1.5 text-[10px] text-slate-500">
                    <i data-lucide="timer" class="w-3 h-3"></i> 
                    진행 시간: <span id="meetingDuration">00:00:00</span>
                </div>
            </div>
        </div>

        <div class="flex items-center space-x-1.5">
            <!-- 테마 토글 버튼 -->
            <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">
                <i data-lucide="sun" id="themeIconSun" class="w-5 h-5 text-amber-500"></i>
                <i data-lucide="moon" id="themeIconMoon" class="w-5 h-5 text-slate-400 hidden"></i>
            </button>
            <!-- 폰트 크기 토글 -->
            <button onclick="cycleFontSize()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition flex items-center gap-1 font-bold text-xs">
                <span id="fontSizeLabel">가</span>
            </button>
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 mx-1"></div>
            <button onclick="createNewMeeting()" class="bg-indigo-600 text-white text-[11px] font-bold px-3 py-2 rounded-lg shadow-md flex items-center gap-1">
                <i data-lucide="plus" class="w-4 h-4"></i> 신규
            </button>
            <button onclick="openArchiveModal()" class="relative p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">
                <i data-lucide="folder-search" class="w-5 h-5"></i>
                <span id="archiveBadge" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-indigo-600 text-[9px] text-white rounded-full flex items-center justify-center font-bold">0</span>
            </button>
            <button onclick="toggleSettings()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 pb-20">
        <!-- 왼쪽 사이드바: 설정 및 오디오 (lg:col-span-4) -->
        <section class="lg:col-span-4 space-y-4 no-print">
            
            <!-- 회의 정보 카드 -->
            <div class="bg-white dark:bg-darkCard rounded-2xl p-4 border border-slate-200 dark:border-slate-700 shadow-sm space-y-3">
                <div class="flex items-center justify-between">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5">
                        <i data-lucide="info" class="w-3.5 h-3.5"></i> 회의 속성
                    </h2>
                    <span id="saveStatus" class="text-[10px] text-emerald-500 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>동기화됨
                    </span>
                </div>
                <input type="text" id="meetingTitle" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="회의 제목을 입력하세요">
                <div class="grid grid-cols-2 gap-2">
                    <input type="datetime-local" id="meetingDate" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-[11px] outline-none">
                    <input type="text" id="meetingAttendees" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-[11px] outline-none" placeholder="참석자">
                </div>
            </div>

            <div class="bg-white dark:bg-darkCard rounded-2xl p-4 border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
                <div class="flex bg-slate-100 dark:bg-slate-900 p-1 rounded-xl">
                    <button onclick="switchInputMode('realtime')" id="tab-realtime" class="flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all bg-white dark:bg-darkCard text-indigo-600 shadow-sm">실시간 녹음</button>
                    <button onclick="switchInputMode('upload')" id="tab-upload" class="flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all text-slate-500">파일 업로드</button>
                </div>

                <div id="panel-realtime" class="space-y-3">
                    <div class="py-6 bg-slate-50 dark:bg-slate-900/30 rounded-xl border-2 border-dashed border-slate-200 dark:border-slate-700 flex flex-col items-center">
                        <!-- 데시벨 미터 -->
                        <div id="micWaves" class="hidden flex items-end gap-1 h-10 mb-2">
                            <div class="w-1.5 bg-indigo-500 rounded-full h-2 wave-bar"></div>
                            <div class="w-1.5 bg-indigo-500 rounded-full h-8 wave-bar"></div>
                            <div class="w-1.5 bg-indigo-500 rounded-full h-4 wave-bar"></div>
                            <div class="w-1.5 bg-indigo-500 rounded-full h-6 wave-bar"></div>
                            <div class="w-1.5 bg-indigo-500 rounded-full h-3 wave-bar"></div>
                        </div>
                        <i data-lucide="mic" id="micIdle" class="w-10 h-10 text-slate-300 mb-2"></i>
                        <span id="recStatus" class="text-[10px] text-slate-400 font-bold">인식 대기 중</span>
                    </div>
                    <div class="flex gap-2">
                        <button id="btnStartSTT" onclick="startSpeechRecognition()" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 transition hover:bg-indigo-700">
                            <i data-lucide="play" class="w-4 h-4"></i> 녹음 시작
                        </button>
                        <button id="btnStopSTT" onclick="stopSpeechRecognition()" class="flex-1 bg-rose-500 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2 hidden transition hover:bg-rose-600">
                            <i data-lucide="square" class="w-4 h-4"></i> 중지
                        </button>
                    </div>
                </div>

                <div id="panel-upload" class="hidden space-y-3">
                    <div class="relative border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl p-4 text-center bg-slate-50 dark:bg-slate-900/30">
                        <input type="file" id="audioFile" accept="audio/*" onchange="handleAudioUpload(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <i data-lucide="file-audio" class="w-8 h-8 text-slate-400 mx-auto mb-1"></i>
                        <p class="text-[10px] font-bold text-slate-500">오디오 파일 선택</p>
                    </div>
                    <div id="audioPlayer" class="hidden space-y-2">
                        <div class="flex justify-between text-[9px] font-bold text-slate-400">
                            <span id="fileName">file.m4a</span>
                            <select id="audioSpeed" onchange="adjustSpeed()" class="bg-transparent text-slate-800 dark:text-white">
                                <option value="1.0">1.0x</option>
                                <option value="1.2">1.2x</option>
                                <option value="1.5">1.5x</option>
                            </select>
                        </div>
                        <audio id="audioElement" controls class="w-full h-10"></audio>
                    </div>
                </div>
            </div>

            <div class="bg-indigo-600 dark:bg-indigo-900 rounded-2xl p-4 shadow-lg text-white space-y-3">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold flex items-center gap-1.5"><i data-lucide="sparkles" class="w-4 h-4"></i> AI 스마트 요약 비서</span>
                    <span class="text-[9px] bg-white/20 px-2 py-0.5 rounded-full">Gemini 2.5</span>
                </div>
                <p class="text-[10px] text-indigo-100">음성 텍스트에서 결정사항과 할 일을 추출합니다.</p>
                <button onclick="runAI()" class="w-full bg-white text-indigo-700 font-black py-3 rounded-xl shadow-sm hover:bg-indigo-50 transition flex items-center justify-center gap-2">
                    <i data-lucide="wand-2" class="w-4 h-4"></i> 회의 요약 생성
                </button>
                <div id="aiLoader" class="hidden flex items-center justify-center gap-2 text-[10px]">
                    <div class="w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                    분석 중...
                </div>
            </div>
        </section>

        <!-- 오른쪽: 텍스트 편집 구역 (lg:col-span-8) -->
        <section class="lg:col-span-8 space-y-4">
            
            <!-- 원본 텍스트 및 단축키 -->
            <div class="bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 flex flex-col h-[320px]">
                <div class="no-print flex items-center justify-between mb-2">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5"><i data-lucide="list" class="w-3.5 h-3.5"></i> 녹음된 대화 원본</h2>
                    <div class="flex gap-2">
                        <button onclick="insertAtCursor('[📌 중요] ')" class="text-[9px] font-bold bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 px-2 py-1 rounded-md">📌 중요</button>
                        <button onclick="insertAtCursor('[❓ 질문] ')" class="text-[9px] font-bold bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded-md">❓ 질문</button>
                        <button onclick="insertTimestamp()" class="text-[9px] font-bold bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-2 py-1 rounded-md">⏱ 시각</button>
                    </div>
                </div>
                <textarea id="rawText" class="w-full flex-1 bg-slate-50 dark:bg-slate-900/50 rounded-xl p-3 outline-none resize-none leading-relaxed" placeholder="음성이 이곳에 실시간으로 기록됩니다..."></textarea>
            </div>

            <!-- 요약 회의록 및 할 일 트래커 -->
            <div class="bg-white dark:bg-darkCard rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 flex flex-col min-h-[400px]">
                <div class="no-print flex items-center justify-between mb-3">
                    <h2 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1.5"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i> 최종 회의록 요약</h2>
                    <div class="flex gap-1">
                        <button onclick="copyAll()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition" title="복사"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        <button onclick="window.print()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition" title="인쇄"><i data-lucide="printer" class="w-4 h-4"></i></button>
                        <button onclick="downloadText()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition" title="다운로드"><i data-lucide="download" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- 마크다운 툴바 -->
                <div class="no-print flex gap-1 mb-2 border-b border-slate-100 dark:border-slate-800 pb-2">
                    <button onclick="formatMd('bold')" class="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded" title="굵게"><i data-lucide="bold" class="w-3.5 h-3.5"></i></button>
                    <button onclick="formatMd('italic')" class="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded" title="기울임"><i data-lucide="italic" class="w-3.5 h-3.5"></i></button>
                    <button onclick="formatMd('list')" class="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded" title="목록"><i data-lucide="list" class="w-3.5 h-3.5"></i></button>
                    <button onclick="formatMd('quote')" class="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded" title="인용구"><i data-lucide="quote" class="w-3.5 h-3.5"></i></button>
                    <button onclick="formatMd('todo')" class="p-1.5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded text-indigo-600" title="할 일 추가"><i data-lucide="check-square" class="w-3.5 h-3.5"></i></button>
                </div>

                <textarea id="finalText" class="w-full flex-1 bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 outline-none resize-none leading-relaxed font-mono" placeholder="최종 요약본이 이곳에 작성됩니다..."></textarea>
                
                <!-- 하단 할 일 인터랙티브 체크보드 -->
                <div class="no-print mt-4 p-3 bg-slate-50 dark:bg-slate-900/50 rounded-xl border border-slate-100 dark:border-slate-800">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-black text-indigo-600 uppercase">Action Items 트래커</span>
                        <span id="taskCounter" class="text-[9px] text-slate-400">0개 완료</span>
                    </div>
                    <div id="todoBoard" class="space-y-1.5 max-h-32 overflow-y-auto">
                        <p class="text-[10px] text-slate-400 italic">요약본에 - [ ] 형태의 할 일을 추가하면 이곳에 나타납니다.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 보관함 모달 -->
    <div id="archiveModal" class="no-print fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-lg w-full p-6 shadow-2xl space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="archive" class="text-indigo-500"></i> 회의 보관함</h3>
                <button onclick="toggleArchiveModal(false)"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <!-- 검색바 추가 -->
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                <input type="text" id="archiveSearch" oninput="filterArchive()" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl pl-9 pr-4 py-2 text-sm outline-none" placeholder="제목이나 참석자 검색...">
            </div>
            <div id="archiveList" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
            <div class="flex justify-end pt-2">
                <button onclick="toggleArchiveModal(false)" class="px-5 py-2 bg-slate-100 dark:bg-slate-700 rounded-xl text-xs font-bold">닫기</button>
            </div>
        </div>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="no-print fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-md w-full p-6 shadow-2xl space-y-4">
            <h3 class="font-bold flex items-center gap-2"><i data-lucide="settings" class="text-indigo-500"></i> 설정</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">Gemini API Key</label>
                    <input type="password" id="apiKey" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm outline-none" placeholder="키를 입력하세요">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 mb-1">음성 인식 언어</label>
                    <select id="recLang" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm outline-none text-slate-900 dark:text-white">
                        <option value="ko-KR">한국어</option>
                        <option value="en-US">영어</option>
                    </select>
                </div>
            </div>
            <button onclick="saveSettings()" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs">설정 저장</button>
            <button onclick="toggleSettings()" class="w-full py-3 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold text-xs">취소</button>
        </div>
    </div>

    <!-- 자체 디자인 컨펌/알림 모달 (alert / confirm 금지 룰 준수) -->
    <div id="confirmModal" class="no-print fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm hidden">
        <div class="bg-white dark:bg-darkCard rounded-2xl max-w-xs w-full p-5 shadow-2xl text-center space-y-4 animate-scaleUp">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-amber-100 dark:bg-amber-900/40 text-amber-600">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <div>
                <h4 class="font-bold text-sm text-slate-900 dark:text-white" id="confirmTitle">알림</h4>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-1" id="confirmMessage">정말 진행하시겠습니까?</p>
            </div>
            <div class="flex space-x-2">
                <button id="btnConfirmCancel" onclick="handleCustomConfirm(false)" class="flex-1 py-2 bg-slate-100 dark:bg-slate-700 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300">취소</button>
                <button id="btnConfirmOk" onclick="handleCustomConfirm(true)" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-md">확인</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="no-print fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[11px] px-4 py-2.5 rounded-full shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-50"></div>

    <script>
        let recognition = null;
        let isRecording = false;
        let activeId = null;
        let durationSeconds = 0;
        let durationInterval = null;

        const DB_KEY = 'm_minutes_db_v2';
        const CONFIG_KEY = 'm_minutes_config';

        // 커스텀 컨펌 관련 콜백 홀더
        let customConfirmCallback = null;

        window.onload = () => {
            lucide.createIcons();
            initApp();
            initTheme();
            
            // 실시간 투두 감지 및 자동 저장 이벤트 연동
            document.getElementById('finalText').addEventListener('input', () => {
                renderTodos();
                autoSave();
            });
            document.querySelectorAll('input, textarea').forEach(el => {
                el.addEventListener('input', autoSave);
            });
        };

        // 앱 초기동작
        function initApp() {
            const db = getDB();
            if (db.length > 0) {
                loadSession(db[db.length - 1].id);
            } else {
                createNewMeeting();
            }
            updateArchiveBadge();
            startDurationTimer();
        }

        // 테마 관리
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.className = saved;
            updateThemeIcons(saved);
        }

        function toggleTheme() {
            const current = document.documentElement.className;
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.className = target;
            localStorage.setItem('theme', target);
            updateThemeIcons(target);
        }

        function updateThemeIcons(theme) {
            if (theme === 'dark') {
                document.getElementById('themeIconSun').classList.add('hidden');
                document.getElementById('themeIconMoon').classList.remove('hidden');
            } else {
                document.getElementById('themeIconSun').classList.remove('hidden');
                document.getElementById('themeIconMoon').classList.add('hidden');
            }
        }

        // 폰트 크기 관리
        let fontSizeIdx = 1; // 0:small, 1:base, 2:large
        const fontClasses = ['font-size-small', 'font-size-base', 'font-size-large'];
        const fontLabels = ['가-', '가', '가+'];
        
        function cycleFontSize() {
            fontSizeIdx = (fontSizeIdx + 1) % 3;
            document.body.classList.remove(...fontClasses);
            document.body.classList.add(fontClasses[fontSizeIdx]);
            document.getElementById('fontSizeLabel').innerText = fontLabels[fontSizeIdx];
            showToast(`글자 크기가 변경되었습니다: ${fontLabels[fontSizeIdx]}`);
        }

        // 타이머 관리
        function startDurationTimer() {
            if (durationInterval) clearInterval(durationInterval);
            durationInterval = setInterval(() => {
                durationSeconds++;
                const h = String(Math.floor(durationSeconds / 3600)).padStart(2, '0');
                const m = String(Math.floor((durationSeconds % 3600) / 60)).padStart(2, '0');
                const s = String(durationSeconds % 60).padStart(2, '0');
                document.getElementById('meetingDuration').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        // 보관함 필터링
        function filterArchive() {
            const query = document.getElementById('archiveSearch').value.toLowerCase();
            renderArchive(query);
        }

        // 마크다운 서식 툴바 삽입
        function formatMd(type) {
            const el = document.getElementById('finalText');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            const selected = text.substring(start, end);
            let result = '';

            switch(type) {
                case 'bold': result = `**${selected}**`; break;
                case 'italic': result = `*${selected}*`; break;
                case 'list': result = `\n- ${selected}`; break;
                case 'quote': result = `\n> ${selected}`; break;
                case 'todo': result = `\n- [ ] ${selected}`; break;
            }

            el.value = text.substring(0, start) + result + text.substring(end);
            el.focus();
            
            // 마크다운 삽입된 후 자동 포커싱 처리
            const nextPos = start + result.length;
            el.setSelectionRange(nextPos, nextPos);
            
            autoSave();
            renderTodos();
        }

        // DB 핸들러
        function getDB() { return JSON.parse(localStorage.getItem(DB_KEY) || '[]'); }
        function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
        function getConfig() { return JSON.parse(localStorage.getItem(CONFIG_KEY) || '{"apiKey":"","lang":"ko-KR"}'); }

        // 신규 회의 생성
        function createNewMeeting() {
            const newId = 'm_' + Date.now();
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            
            const session = {
                id: newId,
                title: '신규 주간 회의록',
                date: now.toISOString().slice(0, 16),
                attendees: '',
                raw: '',
                final: '',
                updatedAt: new Date().toISOString()
            };

            const db = getDB();
            db.push(session);
            saveDB(db);
            loadSession(newId);
            updateArchiveBadge();
            durationSeconds = 0; // 타이머 리셋
            showToast('새 회의록이 생성되었습니다.');
        }

        // 세션 로드
        function loadSession(id) {
            const db = getDB();
            const m = db.find(x => x.id === id);
            if (m) {
                activeId = id;
                document.getElementById('meetingTitle').value = m.title || '';
                document.getElementById('meetingDate').value = m.date || '';
                document.getElementById('meetingAttendees').value = m.attendees || '';
                document.getElementById('rawText').value = m.raw || '';
                document.getElementById('finalText').value = m.final || '';
                renderTodos();
            }
        }

        // 동기화 자동 백업
        function autoSave() {
            if (!activeId) return;
            const db = getDB();
            const idx = db.findIndex(x => x.id === activeId);
            if (idx !== -1) {
                db[idx].title = document.getElementById('meetingTitle').value;
                db[idx].date = document.getElementById('meetingDate').value;
                db[idx].attendees = document.getElementById('meetingAttendees').value;
                db[idx].raw = document.getElementById('rawText').value;
                db[idx].final = document.getElementById('finalText').value;
                db[idx].updatedAt = new Date().toISOString();
                saveDB(db);
            }
            const status = document.getElementById('saveStatus');
            status.innerHTML = '<span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-ping"></span>저장 중';
            setTimeout(() => {
                if (status) status.innerHTML = '<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>동기화됨';
            }, 600);
        }

        // 자체 음성 인식 (STT) 엔진 기동
        function setupSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (window.SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = getConfig().lang;

                recognition.onstart = () => {
                    isRecording = true;
                    document.getElementById('micWaves').classList.remove('hidden');
                    document.getElementById('micIdle').classList.add('hidden');
                    document.getElementById('btnStartSTT').classList.add('hidden');
                    document.getElementById('btnStopSTT').classList.remove('hidden');
                    document.getElementById('recStatus').innerText = '녹음 분석 중...';
                    
                    // 데시벨 바 애니메이션 시뮬레이션 기동
                    runWaveBars(true);
                };

                recognition.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    }
                    if (final) {
                        const area = document.getElementById('rawText');
                        area.value += (area.value ? '\n' : '') + final.trim();
                        autoSave();
                    }
                };

                recognition.onend = () => {
                    if (isRecording) {
                        recognition.start(); // 강제 중단 시 즉시 재연동
                    } else {
                        resetMicUI();
                    }
                };
            }
        }

        function startSpeechRecognition() {
            if (!recognition) setupSpeechRecognition();
            if (recognition) recognition.start();
        }

        function stopSpeechRecognition() {
            isRecording = false;
            if (recognition) recognition.stop();
            resetMicUI();
        }

        function resetMicUI() {
            document.getElementById('micWaves').classList.add('hidden');
            document.getElementById('micIdle').classList.remove('hidden');
            document.getElementById('btnStartSTT').classList.remove('hidden');
            document.getElementById('btnStopSTT').classList.add('hidden');
            document.getElementById('recStatus').innerText = '인식 대기 중';
            runWaveBars(false);
        }

        // 데시벨 시각적 이펙트 제어
        let waveTimer = null;
        function runWaveBars(active) {
            const bars = document.querySelectorAll('.wave-bar');
            if (active) {
                waveTimer = setInterval(() => {
                    bars.forEach(bar => {
                        bar.style.height = `${Math.floor(Math.random() * 30) + 6}px`;
                    });
                }, 150);
            } else {
                clearInterval(waveTimer);
                bars.forEach(bar => bar.style.height = '8px');
            }
        }

        // 요약본 내 마크다운 투두와 하단 UI 동적 연계 제어
        function renderTodos() {
            const text = document.getElementById('finalText').value;
            const container = document.getElementById('todoBoard');
            const regex = /^\s*-\s*\[\s*([ xX]?)\s*\]\s*(.+)$/gm;
            let match;
            let count = 0, done = 0, html = '';
            let matchesList = [];

            while ((match = regex.exec(text)) !== null) {
                const isChecked = match[1].toLowerCase() === 'x';
                const todoText = match[2].trim();
                const fullLine = match[0];
                const lineIndex = match.index;
                
                matchesList.push({ checked: isChecked, text: todoText, fullLine, index: lineIndex });
                count++;
                if (isChecked) done++;
            }

            if (count > 0) {
                matchesList.forEach((todo, idx) => {
                    html += `
                        <div class="flex items-center gap-2 bg-white dark:bg-slate-800 p-2 rounded-lg border border-slate-100 dark:border-slate-700 hover:border-indigo-400 transition">
                            <input type="checkbox" ${todo.checked ? 'checked' : ''} 
                                onchange="toggleTodoOnEditor(${idx}, this.checked)" 
                                class="w-3.5 h-3.5 rounded text-indigo-600 focus:ring-indigo-500 cursor-pointer">
                            <span class="text-[10px] ${todo.checked ? 'line-through text-slate-400' : 'text-slate-600 dark:text-slate-300'} font-bold truncate flex-1">${todo.text}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
                document.getElementById('taskCounter').innerText = `${done}/${count} 완료`;
            } else {
                container.innerHTML = '<p class="text-[10px] text-slate-400 italic">감지된 할 일이 없습니다.</p>';
                document.getElementById('taskCounter').innerText = '0개 완료';
            }

            window.cachedTodos = matchesList;
        }

        // 하단 체크박스 터치 시 상단 원본 마크다운 텍스트 자동 동기화 가공
        function toggleTodoOnEditor(index, isChecked) {
            if (!window.cachedTodos || !window.cachedTodos[index]) return;
            const target = window.cachedTodos[index];
            const editor = document.getElementById('finalText');
            let editorVal = editor.value;

            const charStatus = isChecked ? 'x' : ' ';
            const updatedLine = target.fullLine.replace(/-\s*\[\s*[ xX]?\s*\]/, `- [${charStatus}]`);
            
            editor.value = editorVal.replace(target.fullLine, updatedLine);
            autoSave();
            renderTodos();
        }

        // AI 기반 회의 요약 비서 가동
        async function runAI() {
            const raw = document.getElementById('rawText').value.trim();
            const config = getConfig();
            if (!raw) return showToast('원본 내용이 없습니다.');
            
            document.getElementById('aiLoader').classList.remove('hidden');
            
            if (config.apiKey) {
                // 구글 Gemini 2.5 API 실제 통신
                try {
                    const prompt = `회의 녹취록을 바탕으로 실무용 회의록을 정교하게 작성해줘. 마크다운 형식을 적극 활용하고, 결정된 사항 및 향후 일정, 담당자별 실행 목표를 반드시 포함해줘. 할 일 항목은 반드시 '- [ ] 담당자: 업무 내용' 형식으로 적어줘. \n\n녹취록:\n${raw}`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${config.apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    const result = data.candidates[0].content.parts[0].text;
                    
                    document.getElementById('finalText').value = result;
                    renderTodos();
                    autoSave();
                    showToast('AI 요약본이 생성되었습니다.');
                } catch (e) {
                    showToast('AI 분석 중 서버 통신 에러가 발생하여 로컬 요약으로 대체합니다.');
                    simulateLocalSummary(raw);
                } finally {
                    document.getElementById('aiLoader').classList.add('hidden');
                }
            } else {
                // API 키가 세팅되지 않았을 시 오프라인 시뮬레이션 백업 기동
                setTimeout(() => {
                    simulateLocalSummary(raw);
                    document.getElementById('aiLoader').classList.add('hidden');
                }, 1500);
            }
        }

        // 오프라인 규칙 기반 요약
        function simulateLocalSummary(rawText) {
            const title = document.getElementById('meetingTitle').value || '업무 정기 보고';
            const date = document.getElementById('meetingDate').value || new Date().toLocaleString();
            const attendees = document.getElementById('meetingAttendees').value || '참석 위원 전원';

            const sentences = rawText.split(/[.?!]|\n+/).filter(x => x.trim().length > 3);
            let summaryBullets = "";
            let actionBullets = "";

            if (sentences.length > 0) {
                sentences.forEach((line, idx) => {
                    const clean = line.trim();
                    if (idx % 2 === 0) {
                        summaryBullets += `- 의제 건: ${clean}\n`;
                    } else {
                        actionBullets += `- [ ] [담당자 미지정] ${clean}\n`;
                    }
                });
            } else {
                summaryBullets = "- 주요 핵심 어젠다 공유 완료.\n";
                actionBullets = "- [ ] 세부 구현 사안 피드백 검토\n- [ ] 차주 마일스톤 설계 점검";
            }

            const formatText = `## 📝 최종 회의 요약서: ${title}

### 📅 기본 개요
- **일시**: ${date}
- **참석자**: ${attendees}

---

### 💬 주요 핵심 논의 안건
${summaryBullets}

### 🚀 실행 업무 계획 (Action Items)
${actionBullets}

---
*본 문서는 로컬 보조 요약 템플릿에 의해 빌드되었습니다. 최정밀 요약을 원하시면 설정에서 Gemini API Key를 등록해 주세요.*`;

            document.getElementById('finalText').value = formatText;
            renderTodos();
            autoSave();
            showToast('로컬 분석 요약이 신속히 생성되었습니다.');
        }

        // 보관함 제어
        function toggleArchiveModal(show) {
            document.getElementById('archiveModal').classList.toggle('hidden', !show);
            if (show) renderArchive();
        }

        function renderArchive(query = '') {
            const db = getDB();
            const list = document.getElementById('archiveList');
            const filtered = db.filter(m => 
                (m.title && m.title.toLowerCase().includes(query)) || 
                (m.attendees && m.attendees.toLowerCase().includes(query))
            ).reverse();

            list.innerHTML = filtered.map(m => `
                <div class="flex items-center justify-between p-3 border border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 rounded-xl">
                    <div onclick="selectArchive('${m.id}')" class="cursor-pointer flex-1 pr-2 min-w-0">
                        <h4 class="text-xs font-black truncate ${m.id === activeId ? 'text-indigo-600 dark:text-indigo-400' : ''}">${m.title || '회의명 미등록'}</h4>
                        <p class="text-[9px] text-slate-400 mt-1">${new Date(m.updatedAt).toLocaleString()}</p>
                    </div>
                    <button onclick="deleteMeetingConfirm('${m.id}')" class="p-1.5 text-slate-300 hover:text-rose-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectArchive(id) {
            loadSession(id);
            toggleArchiveModal(false);
            showToast('회의록 기록을 성공적으로 복원했습니다.');
        }

        // 커스텀 대화 상자 인터페이스 (alert / confirm 금지 대응)
        function deleteMeetingConfirm(id) {
            showCustomConfirm('선택한 회의록 데이터를 영구히 완전히 삭제할까요?', () => {
                let db = getDB();
                db = db.filter(x => x.id !== id);
                saveDB(db);
                if (activeId === id) {
                    initApp();
                } else {
                    renderArchive();
                }
                updateArchiveBadge();
                showToast('회의록이 영구 소멸되었습니다.');
            });
        }

        function showCustomConfirm(message, callback) {
            document.getElementById('confirmMessage').innerText = message;
            document.getElementById('confirmModal').classList.remove('hidden');
            customConfirmCallback = callback;
        }

        function handleCustomConfirm(agree) {
            document.getElementById('confirmModal').classList.add('hidden');
            if (agree && customConfirmCallback) {
                customConfirmCallback();
            }
            customConfirmCallback = null;
        }

        function updateArchiveBadge() {
            document.getElementById('archiveBadge').innerText = getDB().length;
        }

        // 커서 지점에 텍스트 퀵 삽입
        function insertAtCursor(val) {
            const el = document.getElementById('rawText');
            const start = el.selectionStart;
            el.value = el.value.substring(0, start) + val + el.value.substring(el.selectionEnd);
            el.focus();
            const nextIdx = start + val.length;
            el.setSelectionRange(nextIdx, nextIdx);
            autoSave();
        }

        // 경과 및 현재 시각 타임스탬프 마킹
        function insertTimestamp() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            insertAtCursor(`[⏱️ ${h}:${m}] `);
        }

        // 스마트 토스트 알람
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => {
                if (t) t.style.opacity = '0';
            }, 3000);
        }

        // 설정 환경 변수 로드 및 변경
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); }
        function saveSettings() {
            const config = { apiKey: document.getElementById('apiKey').value.trim(), lang: document.getElementById('recLang').value };
            localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
            toggleSettings();
            showToast('설정 옵션이 정상 반영되었습니다.');
        }

        // 요약서 클립보드 초고속 전송
        function copyAll() {
            const el = document.getElementById('finalText');
            if (!el.value) return showToast('복사할 회의록 내용이 비어 있습니다.');
            el.select();
            document.execCommand('copy');
            showToast('회의 요약서 전체가 클립보드에 전송되었습니다.');
        }

        // 로컬 기기 다운로드 아웃풋
        function downloadText() {
            const text = document.getElementById('finalText').value;
            if (!text) return showToast('저장할 텍스트 파일 데이터가 없습니다.');
            const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('meetingTitle').value || '회의록'}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('기기 내 텍스트 파일 저장 완료.');
        }

        // 음성 파일 탭 제어 및 데이터 임포트
        function switchInputMode(mode) {
            document.getElementById('panel-realtime').classList.toggle('hidden', mode !== 'realtime');
            document.getElementById('panel-upload').classList.toggle('hidden', mode !== 'upload');
            document.getElementById('tab-realtime').className = mode === 'realtime' ? 'flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all bg-white dark:bg-darkCard text-indigo-600 shadow-sm' : 'flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all text-slate-500';
            document.getElementById('tab-upload').className = mode === 'upload' ? 'flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all bg-white dark:bg-darkCard text-indigo-600 shadow-sm' : 'flex-1 py-1.5 text-[11px] font-bold rounded-lg transition-all text-slate-500';
        }

        function handleAudioUpload(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('audioElement').src = URL.createObjectURL(file);
                document.getElementById('audioPlayer').classList.remove('hidden');
                showToast('음성 녹음 파일 로드에 성공했습니다.');
            }
        }

        function adjustSpeed() {
            const player = document.getElementById('audioElement');
            const speed = document.getElementById('audioSpeed').value;
            player.playbackRate = parseFloat(speed);
        }
    </script>
</body>
